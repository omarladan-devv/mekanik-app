workflows:
  ios-capacitor-workflow:
    name: iOS App Store Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Sync Capacitor iOS project
        script: npx cap sync ios
      - name: Set up code signing
        script: |
          # This command uses the code signing configuration you set up in the Codemagic UI
          xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
