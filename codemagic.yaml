workflows:
  ios-capacitor-workflow:
    name: iOS App Store Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mekanik.app
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Sync Capacitor iOS project
        script: npx cap sync ios
      - name: Set up code signing
        script: |
          app-store-connect fetch-signing-files "com.mekanik.app" --type IOS_APP_STORE --create
          xcode-project use-profiles
      - name: Build IPA
        script: xcode-project build-ipa --workspace "ios/App/App.xcworkspace" --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
