workflows:
  ios-capacitor-workflow:
    name: iOS App Store Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
      groups:
        - apple
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Sync Capacitor iOS project
        script: npx cap sync ios
      - name: Set up App Store Connect API Key for Xcode
        script: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8
      - name: Build and Archive
        script: |
          cd ios/App
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath ../../build/App.xcarchive \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8 \
            -authenticationKeyID ${APP_STORE_CONNECT_KEY_IDENTIFIER} \
            -authenticationKeyIssuerID ${APP_STORE_CONNECT_ISSUER_ID} \
            DEVELOPMENT_TEAM="529W5TMLK4"
      - name: Export IPA
        script: |
          cd ios/App
          cat <<EOF > exportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>manageAppVersionAndBuildNumber</key>
              <true/>
              <key>teamID</key>
              <string>529W5TMLK4</string>
          </dict>
          </plist>
          EOF
          
          xcodebuild -exportArchive \
            -archivePath ../../build/App.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath ../../build/ios/ipa \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8 \
            -authenticationKeyID ${APP_STORE_CONNECT_KEY_IDENTIFIER} \
            -authenticationKeyIssuerID ${APP_STORE_CONNECT_ISSUER_ID}
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
