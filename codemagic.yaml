workflows:
  ios-capacitor-workflow:
    name: iOS App Store Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
      groups:
        - apple
      vars:
        BUNDLE_ID: "com.mekanik.app"
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Sync Capacitor iOS project
        script: npx cap sync ios
      - name: Initialize Keychain
        script: keychain initialize
      - name: Fetch and Create Signing Files
        script: app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
      - name: Add Certificates to Keychain
        script: keychain add-certificates
      - name: Set up Xcode Code Signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: xcode-project build-ipa --workspace "$CM_BUILD_DIR/ios/App/App.xcworkspace" --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
